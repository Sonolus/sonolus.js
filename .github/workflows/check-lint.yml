name: Check Lint

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main']

jobs:
    check:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: 'npm'
            - run: npm ci
            - run: npm run check-lint
