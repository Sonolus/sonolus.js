name: Publish

on:
    workflow_dispatch:
        inputs:
            tag:
                description: Tag
                required: true

permissions:
    id-token: write
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v3
              with:
                  node-version: 'lts/*'
            - run: npm ci
            - run: npm run build
            - run: npm publish --tag ${{ github.event.inputs.tag }}
